name: Релиз проекта keycloak-russian-providers
on:
  release:
    types: [published]
jobs:
  build-master:
    name: Релиз проекта
    runs-on: ubuntu-latest
    steps:
      - name: Клонирование проекта
        uses: actions/checkout@v4  # Checkout the repository code

      - name: Установка Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Создание Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>ossrh</id>
                <username>${{ secrets.OSSRH_USERNAME }}</username>
                <password>${{ secrets.OSSRH_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

          echo "Содержимое ~/.m2/settings.xml:"
          cat ~/.m2/settings.xml

      - name: Публикация проекта в Maven Central
        run: |
          cat <(echo -e "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}") | gpg --batch --import
          cat ~/.m2/settings.xml
          ./mvnw versions:set -DnewVersion=$GITHUB_REF_NAME        
          ./mvnw deploy -Dgpg.passphrase=${{ secrets.MAVEN_GPG_PASSPHRASE }} -Dgpg.keyname=C9AAFE214609D9C5
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}